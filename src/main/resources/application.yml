spring:
  application:
    name: osg
  main:
    allow-bean-definition-overriding: true
  datasource:
    pg:
      driver-class-name: org.postgresql.Driver
      jdbcUrl: ${DBURL}
      username: ${DBUSER}
      password: ${DBPWD}
    tidb:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbcUrl: ${TiDBURL}
      username: ${TiDBUSER}
      password: ${TiDBPWD}
    hikari:
      max-lifetime: 60000
      idle-timeout: 60000
      keepalive-time: 10000
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
  ai:
    # 使用通用的 OpenAI 接口配置，指向 DeepSeek/Aliyun/其他厂商
    # 硅基流动 https://api.siliconflow.cn/ SILICONFLOW_API_KEY
    # DeepSeek https://api.deepseek.com DEEPSEEK_API_KEY
    openai:
      base-url: https://api.siliconflow.cn/
      api-key: ${SILICONFLOW_API_KEY}
      chat:
        options:
          model: ${custom.qwen-name}
          temperature: 0.1
          top_p: 0.7
          stop:
            - "\n"
          frequency_penalty: 0.2
          presence_penalty: 0.1
      embedding:
        base-url: https://api.siliconflow.cn/
        options:
          model: ${custom.rerank-name}
          dimensions: 1024
    vectorstore:
      pgvector:
        dimensions: 1024
        distance-type: COSINE_DISTANCE
        index-type: HNSW
        initialize-schema: false
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
            platform: postgresql
custom:
  coder-name: Qwen/Qwen2.5-Coder-7B-Instruct
  qwen-name: Qwen/Qwen3-8B
  rerank-name: BAAI/bge-m3
  maxMessage: 10

logging:
  level:
    org.springframework.jdbc.core.JdbcTemplate: DEBUG